<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="sps.css">
</head>
<body>


    <h1>this is a rock paper scissor game</h1>
    <div class="options">
        <div  class="option" id="rock"><img src="rock.jpg"><br></div>
        <div  class="option" id="paper"><img src="paper.jpg"><br></div>
        <div  class="option" id="scissor"><img src="scissor.jpg"><br></div>
    </div>


    <div class="choices"><!--score-board-->
        <div class="choice"><!--score-->
            <p id="user-score">0</p>
            <p>your score</p>
        </div>
        <div class="choice"><!--score-->
            <p id="computer-score">0</p>
            <p>computer score</p>
        </div>
    </div>

    
    <div class="message-container">
        <p id="msg">choose your move</p>
    </div>
    <script src="sps.js"></script>

</body>
</html>
